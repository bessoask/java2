<script>

    let tasks = [

        {
            "title": "morning routin",
            "date": " 21/3/26",
            "isdone": true

        },
        {
            "title": "workout",
            "date": " 21/3/26",
            "isdone": false

        },
        {
            "title": "studying",
            "date": " 21/3/26",
            "isdone": true

        }
    ]
    
   function getTasksFromStorage() {
    let storedTasks = localStorage.getItem("tasks")
    if (storedTasks) {
        tasks = JSON.parse(storedTasks)
    }
}

 getTasksFromStorage()
 
    function fillTaskONThePage() {

        document.getElementById("tasks").innerHTML = ""
        let index = 0
        for (task of tasks) {
            let content =
                `
                <div class="task ${task.isdone ? 'done' : ''} " style="display: flex;" >
                                <div style="width: 70%; padding-right: 20px; color: rgb(83, 82, 82); ">
                                    <h2>${task.title}</h2>
                                    <span>
                                        ${task.date}
                                    </span>
                                    <span><i class="fa-solid fa-calendar"></i></span>

                                </div>
                                <div style="display: flex ; justify-content: space-between; width: 20%;  margin-top: 18px;">
                                    <button onclick="deleteTask(${index})" class="circle" style="background-color: rgb(190, 59, 59);  color:white"><span
                                            class="material-symbols-rounded">
                                            delete
                                        </span>
                                    </button>
                                    ${task.isdone ? `  <button onclick ="completeTask(${index})" class="circle" style="background-color: rgb(210, 0, 59); color:white ;">
                                                    <span><i class="fa-solid fa-xmark"></i></span>
                                          </ button>
                                    `:
                    `  <button onclick ="completeTask(${index})" class="circle" style="background-color: rgb(52, 215, 27); color:white ;"><span
                                            class="material-symbols-outlined">
                                            check
                                        </span></button>`}
                                 
                                    <button  onclick = "editTask(${index})" class="circle" style="background-color: blue;  color:white"><span
                                            class="material-symbols-sharp">
                                            edit
                                        </span></button>
                                </div>
                 </div>
     `
            document.getElementById("tasks").innerHTML += content
            index++
    storeTasks()
        }

    }
    fillTaskONThePage()
    
    document.getElementById("add-button").addEventListener("click", function () {
        let now = new Date()
        let date = now.getDate() + "/" + (now.getMonth() + 1) + "/" + now.getFullYear()
        let taskName = prompt("my new task")

        let taskObj = {
            "title": taskName,
            "date": date,
            "isdone": false
        }
        tasks.push(taskObj)
        storeTasks()
        fillTaskONThePage()
       
    })

    function deleteTask(index) {
        let task = tasks[index]
        let isConfirmed = confirm("Are You Sure To delete " + task.title)
        if (isConfirmed) {
            tasks.splice(index, 1)
            storeTasks()
            fillTaskONThePage()
        }

    }
    function editTask(index) {
        let task = tasks[index]
        let newTaskTitle = prompt("Enter New Task Title", task.title)

        task.title = newTaskTitle
      storeTasks()
        fillTaskONThePage()
    }
    function completeTask(index) {
        let task = tasks[index]
        if(task.isdone){
             task.isdone = false
        }else{
             task.isdone = true
        }
     storeTasks()
        fillTaskONThePage()
    }
        function storeTasks(){
            localStorage.setItem("tasks" , JSON.stringify(tasks));
        }
        getTasksFromStorage ()
        storeTasks()

</script>
